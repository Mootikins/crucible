name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/Help/**'
      - 'docs/Guides/**'
      - 'docs-site/**'
      - 'scripts/convert-docs.mjs'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: docs-site

      - name: Convert docs (wikilinks → markdown links)
        run: node scripts/convert-docs.mjs

      - name: Build site
        run: bun run build
        working-directory: docs-site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
