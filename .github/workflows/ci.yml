name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Create web asset placeholder
        run: mkdir -p crates/crucible-web/web/dist && echo "<html></html>" > crates/crucible-web/web/dist/index.html
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --lib --bins --tests -- -W warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Create web asset placeholder
        run: mkdir -p crates/crucible-web/web/dist && echo "<html></html>" > crates/crucible-web/web/dist/index.html
      - name: Build mock ACP agent for smoke tests
        run: cargo build -p crucible-acp --features test-utils --bin mock-acp-agent
      - name: Run tests with nextest
        run: cargo nextest run --profile ci --workspace
      - name: Verify Lua stubs are not stale
        run: cargo nextest run --profile ci -p crucible-lua -E 'test(stubs)' --no-capture

  test-sqlite:
    name: Test SQLite Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Create web asset placeholder
        run: mkdir -p crates/crucible-web/web/dist && echo "<html></html>" > crates/crucible-web/web/dist/index.html
      - name: Build cru binary for e2e tests
        run: cargo build -p crucible-cli --bin cru
      - name: Build mock ACP agent for smoke tests
        run: cargo build -p crucible-acp --features test-utils --bin mock-acp-agent
      - name: Run SQLite-specific tests
        run: |
          cargo nextest run -p crucible-sqlite
          cargo nextest run -p crucible-daemon --features storage-sqlite

  test-web:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/crucible-web/web
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run Playwright E2E tests
        run: bunx playwright test --reporter=line
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            crates/crucible-web/web/playwright-report/
            crates/crucible-web/web/test-results/
          retention-days: 7
