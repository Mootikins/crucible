# Crucible ACP Demo Configuration
# Extends demo-config.toml with delegation settings for cross-agent demos.
# Used by delegation-demo.tape for recording Claude → Cursor delegation.

kiln_path = "./docs"

[llm]
default = "demo"

[llm.providers.demo]
type = "openai"
endpoint = "https://llm.example.com/v1"
default_model = "glm-4.7-flash-iq4"
temperature = 0.3
max_tokens = 2048

[chat]
agent_preference = "crucible"

[cli]
show_progress = false
confirm_destructive = true
verbose = false

[storage]
mode = "sqlite"

[enrichment.provider]
type = "fastembed"
model = "BAAI/bge-small-en-v1.5"
batch_size = 32
dimensions = 384

[enrichment.pipeline]
worker_count = 4
batch_size = 16
max_queue_size = 1000
timeout_ms = 30000
retry_attempts = 3
retry_delay_ms = 1000

# ACP Agent Profiles with Delegation Configuration
[acp.agents.claude]
extends = "claude"

[acp.agents.claude.delegation]
enabled = true
max_depth = 1
allowed_targets = ["cursor", "opencode"]

[acp.agents.cursor]
extends = "cursor"

[acp.agents.opencode]
extends = "opencode"
