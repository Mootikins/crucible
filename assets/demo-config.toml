# Crucible Demo Configuration
# Used by VHS tape files for reproducible demo recordings.
# Points to docs/ as the kiln (ships with the repo, 155 notes).

kiln_path = "/home/moot/crucible/docs"

[llm]
default = "demo"

[llm.providers.demo]
type = "openai"
endpoint = "https://llama.krohnos.io/v1"
default_model = "qwen3-32b-ud-q4_k_xl"
temperature = 0.3
max_tokens = 2048

[chat]
agent_preference = "crucible"
internal_backend = "rig"

[cli]
show_progress = false
confirm_destructive = true
verbose = false

[storage]
mode = "sqlite"

[enrichment.provider]
type = "fastembed"
model = "BAAI/bge-small-en-v1.5"
batch_size = 32
dimensions = 384

[enrichment.pipeline]
worker_count = 4
batch_size = 16
max_queue_size = 1000
timeout_ms = 30000
retry_attempts = 3
retry_delay_ms = 1000
