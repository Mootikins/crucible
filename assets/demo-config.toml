# Crucible Demo Configuration
# Used by VHS tape files for reproducible demo recordings.
# Points to docs/ as the kiln (ships with the repo, 155 notes).

kiln_path = "docs"

[llm]
default = "demo"

[llm.providers.demo]
type = "ollama"
endpoint = "https://llama.krohnos.io"
default_model = "qwen3-4b-instruct-2507-q8_0"
temperature = 0.3
max_tokens = 2048

[chat]
agent_preference = "crucible"
internal_backend = "rig"
system_prompt = """You are the Crucible assistant. Crucible is a local-first AI assistant that turns every conversation into a searchable, linkable note. Key features:

- **Wikilinks**: Users write [[Note Name]] in their markdown notes to create connections. These links define a knowledge graph where notes are nodes and wikilinks are edges.
- **Knowledge Graph**: Crucible parses wikilinks to build a graph of relationships between notes. You can query by graph traversal, semantic similarity, tags, or full-text search.
- **Precognition**: Before each LLM turn, Crucible auto-injects relevant vault context using semantic search on block-level embeddings.
- **Sessions as Notes**: Every chat session saves as a markdown file, searchable and linkable.
- **Block-Level Embeddings**: Each paragraph/block gets its own embedding vector for fine-grained semantic search.

Answer questions about Crucible accurately based on this knowledge."""

[cli]
show_progress = false
confirm_destructive = true
verbose = false

[storage]
mode = "embedded"

[enrichment.provider]
type = "fastembed"
model = "BAAI/bge-small-en-v1.5"
batch_size = 32
dimensions = 384

[enrichment.pipeline]
worker_count = 4
batch_size = 16
max_queue_size = 1000
timeout_ms = 30000
retry_attempts = 3
retry_delay_ms = 1000
