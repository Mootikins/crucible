# Nextest configuration for crucible test suite
# See: https://nexte.st/book/configuration.html

experimental = ["setup-scripts"]

[store]
dir = "target/nextest"

# NOTE: profiles select retry/timeout behavior only — none of them filter the
# test set. Slow/external tests are gated with #[ignore], not profiles.

[profile.default]
retries = 0
fail-fast = true
slow-timeout = { period = "30s", terminate-after = 2 }

# Fast feedback loop: tight timeouts, bail on first failure
[profile.unit]
retries = 0
fail-fast = true
slow-timeout = { period = "10s", terminate-after = 1 }

# Longer timeouts for real I/O / real DB tests
[profile.integration]
retries = 0
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }

# CI profile - everything except #[ignore]d tests (slow/manual gating is via
# #[ignore], not name filters; a name filter here once silently dropped a real
# test whose name contained "manual")
[profile.ci]
retries = 1
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }

# API/trait verification runs: strict, no retries
[profile.contract]
retries = 0
fail-fast = true
slow-timeout = { period = "30s", terminate-after = 1 }

# Setup scripts — build test fixtures before test runs
[scripts.setup.build-test-fixtures]
command = 'cargo build -p crucible-daemon --features test-utils --bin mock-acp-agent'

[[profile.default.scripts]]
filter = 'package(crucible-daemon)'
setup = 'build-test-fixtures'

[[profile.unit.scripts]]
filter = 'package(crucible-daemon)'
setup = 'build-test-fixtures'

[[profile.ci.scripts]]
filter = 'package(crucible-daemon)'
setup = 'build-test-fixtures'

[[profile.contract.scripts]]
filter = 'package(crucible-daemon)'
setup = 'build-test-fixtures'

[[profile.integration.scripts]]
filter = 'package(crucible-daemon)'
setup = 'build-test-fixtures'
